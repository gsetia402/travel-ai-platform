version: "3.9"

services:
  travel-ai:
    build: .
    container_name: travel-ai-platform
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      # Set DATABASE_URL here or in .env for PostgreSQL
      # - DATABASE_URL=postgresql://user:pass@host:5432/tripops
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
